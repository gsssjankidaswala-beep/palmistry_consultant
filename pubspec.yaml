name: palmistry_palmist
description: "Palmist/Consultant side app - manage consultations, analyze hands, assign remedies."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  bloc: ^8.1.1
  get_it: ^7.5.0

  # Firebase
  firebase_core: ^2.24.0
  cloud_firestore: ^4.13.0
  firebase_auth: ^4.14.0
  firebase_storage: ^11.5.0
  firebase_analytics: ^10.7.0

  # Camera & Image Processing
  camera: ^0.10.5+2
  image_picker: ^1.0.4
  image: ^4.1.0
  photo_view: ^0.14.0

  # UI/UX
  shimmer: ^3.0.0
  fl_chart: ^0.64.0
  pdf: ^3.10.0
  printing: ^5.11.0
  table_calendar: ^3.0.9

  # Audio & Voice
  just_audio: ^0.9.36

  # Local Storage & Database
  path_provider: ^2.1.1
  sqflite: ^2.3.0
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Utilities
  intl: ^0.19.0
  equatable: ^2.0.5
  connectivity_plus: ^5.0.1
  http: ^1.1.0
  dio: ^5.3.1
  dartz: ^0.10.1

  # Permissions
  permission_handler: ^11.3.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.6
  hive_generator: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
